<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inventario - Barcelona Turisme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h1>Inventario de Activos</h1>
            <div>
                <button id="btn-nuevo" class="btn btn-success me-2">+ Nuevo Ordenador</button>
                <button id="btn-actualizar" class="btn btn-primary">Actualizar Datos</button>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="inventorySearch" class="form-control"
                                placeholder="Buscar por nombre o número de serie...">
                        </div>
                    </div>
                </div>
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Equipo / Modelo</th>
                            <th>Tipo</th>
                            <th>Nº Serie</th>
                            <th>Ubicación</th>
                            <th>Especificaciones</th>
                            <th>Compra</th>
                            <th>Notas</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalOrdinador" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Nuevo Ordenador</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-ordinador">
                        <input type="hidden" id="ord-id">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre Equipo</label>
                                <input type="text" class="form-control" id="ord-nom" required placeholder="Ej: C0123">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Número de Serie</label>
                                <input type="text" class="form-control" id="ord-serial">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" id="ord-type">
                                    <option value="PC">PC</option>
                                    <option value="Portàtil">Portàtil</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Modelo</label>
                                <input type="text" class="form-control" id="ord-model">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Ubicación</label>
                                <input type="text" class="form-control" id="ord-ubicacio">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">RAM</label>
                                <input type="text" class="form-control" id="ord-ram" placeholder="Ej: 16GB">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Disco (HDD/SSD)</label>
                                <input type="text" class="form-control" id="ord-hdd" placeholder="Ej: 512GB SSD">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Sistema Operativo</label>
                                <input type="text" class="form-control" id="ord-so" placeholder="Ej: Win 11">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="ord-estat">
                                    <option value="1">EN ÚS</option>
                                    <option value="2">STOCK</option>
                                    <option value="0">BAIXA</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha de Compra</label>
                                <input type="date" class="form-control" id="ord-date">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="js/ordinadors.js"></script>

</body>

</html>
