version: '3.8'

services:
  # 1. Base de Datos
  mysql-db:
    image: mysql:8.0
    container_name: inventario-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inventario-net
    restart: unless-stopped

  # 2. Backend (Spring Boot)
  backend:
    build:
      context: ./inventory-backend
      dockerfile: Dockerfile
    container_name: inventario-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    depends_on:
      - mysql-db
    networks:
      - inventario-net
    restart: unless-stopped

  # 3. Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: inventario-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - inventario-net
    restart: unless-stopped

networks:
  inventario-net:
    driver: bridge

volumes:
  mysql_data: