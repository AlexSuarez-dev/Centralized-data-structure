server {
    listen 80;
    
    # Generic name for GitHub. Locally it will use the appropriate one.
    server_name localhost my-inventory-app.local; 

    # 1. Frontend routes (HTML, CSS, JS files)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend routes (Reverse Proxy)
    # Anything starting with /api/ is invisibly redirected to Spring Boot
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}