<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Usuarios - Barcelona Turisme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

    <div id="navbar-container"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h1>Usuarios</h1>
            <div>
                <button id="btn-nuevo" class="btn btn-success me-2">+ Nuevo Usuario</button>
                <button id="btn-actualizar" class="btn btn-primary">Actualizar Datos</button>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="userSearch" class="form-control"
                                placeholder="Buscar por nombre, usuario o equipo asignado...">
                        </div>
                    </div>
                </div>
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Usuario</th>
                            <th>Teléfono</th>
                            <th>Email / Depto</th>
                            <th>Equipo Asignado</th>
                            <th>Nº Serie</th>
                            <th>Kensington</th>
                            <th class="text-center">Notas</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Nuevo Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-usuario">
                        <input type="hidden" id="usr-original-id">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nombre Completo (ID)</label>
                                <input type="text" class="form-control" id="usr-nom" required
                                    placeholder="Ej: Maria López">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Teléfono</label>
                                <input type="number" class="form-control" id="usr-telefon" placeholder="Ej: 600123456">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="usr-email"
                                    placeholder="mlopez@bcnturisme.cat">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Departamento</label>
                                <input type="text" class="form-control" id="usr-depto"
                                    placeholder="Atención al cliente">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Llave Kensington</label>
                                <input type="text" class="form-control" id="usr-kensington" placeholder="Ej: KENS-001">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">Equipo Asignado (ID Activo)</label>
                                <input type="number" class="form-control" id="usr-actiu-id"
                                    placeholder="ID del ordenador (Ej: 1570)">
                                <div class="form-text">Más adelante cambiaremos esto por un desplegable dinámico.</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="usr-estat">
                                    <option value="1">ACTIVO</option>
                                    <option value="0">BAJA</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label class="form-label">Notas</label>
                                <textarea class="form-control" id="usr-observacions" rows="2"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btn-guardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="js/navbar.js"></script>
    <script type="module" src="js/usuarios.js"></script>

</body>

</html>
